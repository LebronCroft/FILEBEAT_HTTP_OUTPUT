filebeat:
  config:
    modules:
      enabled: true
      path: ./modules.d/filebeat.yml
      reload:
        enabled: true
        period: 10s

queue:
  mem:
    events: 10000
    flush:
      min_events: 500
      timeout: 5s

output:
  http:
    hosts:
      - "http://example.com:8080"
    path: "/receive/log"
    max_retries: 3
    timeout: 60s
