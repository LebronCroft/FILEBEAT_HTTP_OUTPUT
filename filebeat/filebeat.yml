filebeat:
  inputs:
    - type: filestream
      enabled: true
      paths:
        - /var/log/nginx/access.log*
      max_line_size: 10485760  # 10MB

output.file:
  enabled: true
  path: "./output"
  filename: "log_output"
  codec.json:
    pretty: false
  rotate_every_kb: 10240
  number_of_files: 100
