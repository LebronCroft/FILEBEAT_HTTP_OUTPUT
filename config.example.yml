filebeat:
  config:
    modules:
      enabled: true
      path: ./modules.d/filebeat.yml
      reload:
        enabled: true
        period: 10s

queue:
  mem:
    events: 10000
    flush:
      min_events: 500
      timeout: 5s

output:
  http:
    hosts:
      - "https://example.com:8080"
    path: "/receive/log"
    parameters:
      source: "filebeat"
    max_retries: 3
    timeout: 60s
    format: json
    batch_publish: true
    batch_size: 2048
    compression_level: 0
    loadbalance: false
    headers:
      Authorization: "Bearer your-token-here"
    tls:
      certificate_authorities:
        - "your-cert.pem"
      certificate: "your-client-cert.pem"
      key: "your-key.pem"

logging:
  path: ./logs
  module_name: filebeat-http-output
  max_size: 100
  max_backups: 3
  max_age: 30
  compress: true

scripts:
  module_watcher:
    enabled: true
    directory: ./modules.d
    interval: 1m
